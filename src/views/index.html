<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Markdown and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --chat-bg: #0f172a;
            --msg-user: #334155;
            --msg-ai: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar Styles */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .new-chat-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.75rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .new-chat-btn:hover {
            background: var(--glass-border);
            transform: translateY(-2px);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: var(--glass);
            color: white;
            border-color: var(--glass-border);
        }

        .history-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: white;
            border-color: rgba(99, 102, 241, 0.4);
        }

        /* Tabs/Navigation */
        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 0.75rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }

        .nav-btn:hover {
            background: var(--glass-border);
            color: white;
        }

        .nav-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-light);
        }

        /* Todo Section Styles */
        .page-section {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .page-section.active {
            display: flex;
        }

        .todo-container {
            max-width: 800px;
            margin: 2rem auto;
            width: 100%;
            padding: 0 2rem;
        }

        .todo-form {
            background: var(--sidebar-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .todo-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 0.75rem;
            color: white;
            outline: none;
        }

        .todo-input:focus {
            border-color: var(--primary);
        }

        .todo-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .todo-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .todo-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
        }

        .todo-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .todo-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .todo-title {
            font-weight: 400;
        }

        .todo-title.completed {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .todo-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ef4444;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--primary-light);
        }

        /* Main Chat Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .chat-header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            padding: 1.25rem;
            border-radius: 20px;
            position: relative;
            animation: fadeIn 0.4s ease forwards;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .message.ai {
            align-self: flex-start;
            background-color: var(--msg-ai);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 4px;
        }

        .ai-label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
        }

        /* Markdown Styles */
        .content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
        }

        .content pre {
            margin: 1rem 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .content pre code {
            display: block;
            padding: 1rem;
            overflow-x: auto;
            background: #1a1a1a !important;
        }

        .content h1, .content h2, .content h3 { margin: 1rem 0 0.5rem; }
        .content ul, .content ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .content p { margin-bottom: 1rem; }
        .content table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        .content th, .content td { border: 1px solid var(--glass-border); padding: 0.5rem; text-align: left; }
        .content th { background: var(--glass); }

        /* Input Area */
        .chat-input-container {
            padding: 2rem;
            padding-top: 1rem;
        }

        .input-wrapper {
            max-width: 900px;
            margin: 0 auto;
            background: var(--sidebar-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem;
            font-size: 1rem;
            resize: none;
            max-height: 200px;
            outline: none;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--primary-light);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* Loading Dots Animation */
        .dots { display: flex; gap: 4px; align-items: center; min-height: 24px; }
        .dot { width: 6px; height: 6px; background: var(--text-dim); border-radius: 50%; animation: pulse 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            aside { display: none; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>⚡</span> CUBEPATH
        </div>

        <nav class="nav-tabs">
            <div class="nav-btn active" id="btn-show-chat" onclick="switchPage('chat')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                AI Chat
            </div>
            <div class="nav-btn" id="btn-show-todos" onclick="switchPage('todos')">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Gestión REST (Usuarios)
            </div>
        </nav>

        <div id="chat-sidebar-items">
            <button class="new-chat-btn" id="new-chat-btn">
                + Nuevo Chat
            </button>
            <div class="history-list" id="history-items">
                <!-- Items filled by JS -->
            </div>
        </div>

        <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--glass-border);">
            <div id="clear-history" class="history-item" style="color: #ef4444; font-weight: 600;">× Borrar Historial</div>
        </div>
    </aside>

    <main>
        <!-- Chat Section -->
        <div id="section-chat" class="page-section active">
            <div class="chat-header">
                <h2 id="current-chat-title" style="font-size: 1.1rem; font-weight: 600;">Nueva Conversación</h2>
                <div id="status-indicator" style="font-size: 0.8rem; color: var(--text-dim);">En línea</div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="message ai">
                    <div class="ai-label">Asistente</div>
                    <div class="content">Hola, ¿en qué podemos trabajar hoy?</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Pregunta lo que quieras..." rows="1"></textarea>
                    <button class="send-btn" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
                <div style="text-align: center; color: var(--text-dim); font-size: 0.75rem; margin-top: 0.75rem;">
                    Usando OpenRouter / model: openrouter/free
                </div>
            </div>
        </div>

        <!-- Users Section -->
        <div id="section-todos" class="page-section">
            <div class="chat-header">
                <h2 style="font-size: 1.1rem; font-weight: 600;">Probador de API REST - Usuarios</h2>
                <button class="btn-add" onclick="fetchUsers()" style="padding: 0.4rem 1rem;">Refrescar</button>
            </div>
            
            <div class="todo-container">
                <div class="todo-form" style="flex-direction: column; gap: 0.75rem;">
                    <div style="display: flex; gap: 0.75rem;">
                        <input type="text" id="user-input-name" class="todo-input" placeholder="Nombre completo">
                        <input type="email" id="user-input-email" class="todo-input" placeholder="Correo electrónico">
                    </div>
                    <button class="btn-add" onclick="createUser()" style="width: 100%;">Añadir Usuario</button>
                </div>

                <div class="todo-list" id="user-list">
                    <!-- User items here -->
                    <div style="text-align: center; padding: 2rem; color: var(--text-dim);">Cargando usuarios...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Configure Marked with Highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const historyList = document.getElementById('history-items');
        const newChatBtn = document.getElementById('new-chat-btn');
        const clearHistoryBtn = document.getElementById('clear-history');
        const currentChatTitle = document.getElementById('current-chat-title');

        let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        let currentSession = null;

        function updateHistoryUI() {
            historyList.innerHTML = '';
            history.forEach((session, index) => {
                const item = document.createElement('div');
                item.className = `history-item ${currentSession === index ? 'active' : ''}`;
                item.textContent = session.title || 'Nueva Conversación';
                item.onclick = () => loadSession(index);
                historyList.appendChild(item);
            });
            localStorage.setItem('chat_history', JSON.stringify(history));
        }

        function loadSession(index) {
            currentSession = index;
            const session = history[index];
            currentChatTitle.textContent = session.title || 'Conversación';
            
            // Clear current view
            chatMessages.innerHTML = '';
            session.messages.forEach(msg => {
                addMessageToUI(msg.role, msg.content, false);
            });
            updateHistoryUI();
        }

        function createNewSession() {
            currentSession = history.length;
            history.push({
                title: 'Nueva Conversación',
                messages: []
            });
            chatMessages.innerHTML = `
                <div class="message ai">
                    <div class="ai-label">Asistente</div>
                    <div class="content">Hola, ¿en qué podemos trabajar hoy?</div>
                </div>
            `;
            currentChatTitle.textContent = 'Nueva Conversación';
            updateHistoryUI();
        }

        function addMessageToUI(role, content, isNew = true) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user' : 'ai'}`;
            
            if (role === 'assistant' || role === 'ai') {
                msgDiv.innerHTML = `<div class="ai-label">Asistente</div><div class="content"></div>`;
                msgDiv.querySelector('.content').innerHTML = marked.parse(content);
            } else {
                msgDiv.textContent = content; // User content kept as text
            }
            
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            if (isNew && currentSession !== null) {
                history[currentSession].messages.push({ role, content });
                if (role === 'user' && history[currentSession].messages.length === 1) {
                    history[currentSession].title = content.length > 30 ? content.substring(0, 30) + '...' : content;
                }
                updateHistoryUI();
            }
            return msgDiv;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            if (currentSession === null) createNewSession();

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            userInput.style.height = 'auto';

            addMessageToUI('user', text);

            const aiMsgDiv = addMessageToUI('assistant', '', false);
            const aiContent = aiMsgDiv.querySelector('.content');
            aiContent.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        messages: history[currentSession].messages 
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || 'Error en el servidor');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                aiContent.innerHTML = ''; // Clear dots

                let fullText = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    buffer += chunk;
                    
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || ''; // Keep the last partial line in the buffer

                    for (const line of lines) {
                        const trimmedLine = line.trim();
                        if (!trimmedLine || !trimmedLine.startsWith('data: ')) continue;
                        
                        const dataStr = trimmedLine.slice(6);
                        if (dataStr === '[DONE]') break;
                        
                        try {
                            const parsed = JSON.parse(dataStr);
                            if (parsed.content) {
                                if (parsed.service) {
                                    const statusIndicator = document.getElementById('status-indicator');
                                    if (statusIndicator) statusIndicator.textContent = `Proveedor: ${parsed.service}`;
                                }
                                fullText += parsed.content;
                                aiContent.innerHTML = marked.parse(fullText);
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                        } catch (e) {
                            console.error('Error parsing SSE data:', e, dataStr);
                        }
                    }
                }
                history[currentSession].messages.push({ role: 'assistant', content: fullText });
                updateHistoryUI();

            } catch (err) {
                aiContent.textContent = 'Parece que hubo un problema: ' + err.message;
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        newChatBtn.onclick = createNewSession;
        clearHistoryBtn.onclick = () => {
            if (confirm('¿Seguro que quieres borrar todo el historial?')) {
                history = [];
                currentSession = null;
                updateHistoryUI();
                chatMessages.innerHTML = '';
                createNewSession();
            }
        };

        // Tab Switching Logic
        function switchPage(page) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`section-${page}`).classList.add('active');
            document.getElementById(`btn-show-${page}`).classList.add('active');

            if (page === 'todos') {
                fetchUsers();
            }
        }

        // User REST API Logic
        async function fetchUsers() {
            const listElement = document.getElementById('user-list');
            try {
                const response = await fetch('/users');
                if (!response.ok) throw new Error('Error al cargar usuarios');
                const users = await response.json();
                
                listElement.innerHTML = '';
                if (users.length === 0) {
                    listElement.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-dim);">No hay usuarios registrados.</div>';
                    return;
                }

                users.forEach(user => {
                    const item = document.createElement('div');
                    item.className = 'todo-item';
                    item.innerHTML = `
                        <div class="todo-info">
                            <input type="checkbox" class="todo-checkbox" ${user.active ? 'checked' : ''} onchange="toggleUser(${user.id}, this.checked)">
                            <div>
                                <div class="todo-title ${!user.active ? 'completed' : ''}">${user.name}</div>
                                <div style="font-size: 0.75rem; color: var(--text-dim);">${user.email}</div>
                            </div>
                        </div>
                        <div class="todo-actions">
                            <button class="btn-icon" onclick="deleteUser(${user.id})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    `;
                    listElement.appendChild(item);
                });
            } catch (err) {
                listElement.innerHTML = `<div style="text-align: center; padding: 2rem; color: #ef4444;">${err.message}</div>`;
            }
        }

        async function createUser() {
            const nameInput = document.getElementById('user-input-name');
            const emailInput = document.getElementById('user-input-email');
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            
            if (!name || !email) return;

            try {
                const response = await fetch('/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, active: true })
                });
                if (!response.ok) throw new Error('Error al crear usuario');
                nameInput.value = '';
                emailInput.value = '';
                fetchUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        async function toggleUser(id, active) {
            try {
                const response = await fetch(`/users/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ active })
                });
                if (!response.ok) throw new Error('Error al actualizar usuario');
                fetchUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        async function deleteUser(id) {
            if (!confirm('¿Seguro que quieres eliminar este usuario?')) return;
            try {
                const response = await fetch(`/users/${id}`, {
                    method: 'DELETE'
                });
                if (!response.ok) throw new Error('Error al eliminar usuario');
                fetchUsers();
            } catch (err) {
                alert(err.message);
            }
        }

        // Initialize App
        if (history.length > 0) {
            loadSession(0);
        } else {
            updateHistoryUI();
        }
    </script>
</body>
</html>
